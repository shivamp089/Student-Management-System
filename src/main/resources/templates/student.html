<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<title>Student Management</title>
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
	integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
	crossorigin="anonymous">
	
<style>


</style>	
</head>
<body >
	<nav class="navbar navbar-dark bg-dark">
		<div class="container">
			<a class="navbar-brand font-weight-bold" href="/students">
				Student Management </a>

			<ul class="navbar-nav flex-row ml-auto">
				<li class="nav-item mx-2"><a class="nav-link text-white"
					href="/home">Home</a></li>
				<li class="nav-item mx-2"><a class="nav-link text-white"
					href="/students">Students</a></li>
				<li class="nav-item mx-2"><a class="nav-link text-white"
					href="/students/new">Add Student</a></li>
			</ul>
		</div>
	</nav>

	<div class="container">
		<div>
			<h2 class="text-center">Student List</h2>
		</div>
		<div class="row">
			<div class="col-lg-3">
				<a th:href="@{students/new}" class="btn btn-primary btn-sm mb-2">Add
					Student</a>
			</div>

		</div>
		<table class="table table-stripped table-bordered">
			<thead>
				<tr class="bg-dark text-white">
					<th>First Name</th>
					<th>Last Name</th>
					<th>Email</th>
					<th>Mobile</th>
					<th>Action</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="student : ${students}">
					<td th:text="${student.firstName}"></td>
					<td th:text="${student.lastName}"></td>
					<td th:text="${student.email}"></td>
					<td th:text="${student.moNo}"></td>
					<td>
						<div class="d-flex flex-wrap justify-content-center gap-2">

							<a th:href="@{students/edit/{id}(id=${student.id})}"
								class="btn btn-warning btn-sm mr-1" > Update </a> <a
								th:href="@{students/{id}(id=${student.id})}"
								class="btn btn-danger btn-sm"
								onclick="return confirm('Are you sure?')"> Delete </a>

						</div>
					</td>


				</tr>
			</tbody>
		</table>
	</div>

</body>
</html>
