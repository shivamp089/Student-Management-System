<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<title>Update Student</title>

<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
	integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
	crossorigin="anonymous">

	<style>
	.navbar {
        background: linear-gradient(90deg, #0d1b2a, #1b263b);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
		font-weight: 700;
		
		

      }
	
		
	</style>
</head>

<body >

	<nav class="navbar">
		<div class="container">
			<a class="navbar-brand font-weight-bold" href="/students">
				Student Management </a>

			<ul class="navbar-nav flex-row ml-auto">
				<li class="nav-item mx-2"><a class="nav-link text-white"
					href="/students">Home</a></li>
				<li class="nav-item mx-2"><a class="nav-link text-white"
					href="/students">Students</a></li>
				<li class="nav-item mx-2"><a class="nav-link text-white"
					href="/students/new">Add Student</a></li>
			</ul>
		</div>
	</nav>


	<div class="container">
		<div class="row justify-content-center align-items-center"
			style="min-height: 100vh;">

			<div class="col-md-6">

				<div class="card">
					<div class="card-header text-center bg-warning font-weight-bold">
						<h5>Update  Student</h5>
					</div>

					<div class="card-body">
						<form th:action="@{/students/edit/{id}(id=${student.id})}" th:object="${student}"
							method="post">

							<div class="form-group">
								<label>Student First Name</label> <input type="text"
									name="firstName" class="form-control" th:field="*{firstName}"
									placeholder="Enter Student First Name">
							</div>

							<div class="form-group">
								<label>Student Last Name</label> <input type="text"
									name="lastName" class="form-control" th:field="*{lastName}"
									placeholder="Enter Student Last Name">
							</div>

							<div class="form-group">
								<label>Student Email</label> <input type="email" name="email"
									class="form-control" th:field="*{email}" placeholder="Enter Student Email">
							</div>

							<div class="form-group">
								<label>Student Mobile Number</label> <input type="text"
									name="moNo" class="form-control" th:field="*{MoNo}"
									placeholder="Enter Student Mobile Number">
							</div>

							<div class="text-center">
								<button type="submit" class="btn btn-primary px-4">
									Update</button>
							</div>

						</form>
					</div>
				</div>

			</div>
		</div>
	</div>

</body>
</html>
