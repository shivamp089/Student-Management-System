<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<title>Create New Student</title>

<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
	integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
	crossorigin="anonymous">
</head>

<body >

	<nav class="navbar navbar-dark bg-dark">
		<div class="container">
			<a class="navbar-brand font-weight-bold" href="/students">
				Student Management </a>

			<ul class="navbar-nav flex-row ml-auto">
				<li class="nav-item mx-2"><a class="nav-link text-white"
					href="/home">Home</a></li>
				<li class="nav-item mx-2"><a class="nav-link text-white"
					href="/students">Students</a></li>
				<li class="nav-item mx-2"><a class="nav-link text-white"
					href="/students/new">Add Student</a></li>
			</ul>
		</div>
	</nav>


	<div class="container">
		<div class="row justify-content-center align-items-center"
			style="min-height: 100vh;">

			<div class="col-md-6">

				<div class="card">
					<div class="card-header text-center">
						<h5>Create New Student</h5>
					</div>

					<div class="card-body">
						<form th:action="@{/students}" th:object="${student}"
							method="post">

							<div class="form-group">
								<label>Student First Name</label> <input type="text"
									name="firstName" class="form-control"
									placeholder="Enter Student First Name">
							</div>

							<div class="form-group">
								<label>Student Last Name</label> <input type="text"
									name="lastName" class="form-control"
									placeholder="Enter Student Last Name">
							</div>

							<div class="form-group">
								<label>Student Email</label> <input type="email" name="email"
									class="form-control" placeholder="Enter Student Email">
							</div>

							<div class="form-group">
								<label>Student Mobile Number</label> <input type="text"
									name="moNo" class="form-control"
									placeholder="Enter Student Mobile Number">
							</div>

							<div class="text-center">
								<button type="submit" class="btn btn-primary px-4">
									Submit</button>
							</div>

						</form>
					</div>
				</div>

			</div>
		</div>
	</div>

</body>
</html>
